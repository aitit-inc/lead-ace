services:
  harness:
    build:
      context: .
      dockerfile: Dockerfile
    image: lead-ace-e2e-harness:latest
    working_dir: /repo
    environment:
      LEADACE_MCP_URL: ${LEADACE_MCP_URL:-https://mcp.leadace.ai/mcp}
      # Pin Claude Code's MCP OAuth callback to a fixed port so we can publish
      # it to the host. Without this the CLI picks a random ephemeral port and
      # the host browser cannot reach the in-container callback server (the
      # browser is told `http://localhost:<random>/callback` and macOS Docker
      # Desktop does not bridge that back to the container).
      MCP_OAUTH_CALLBACK_PORT: 47291
    ports:
      # Map container's fixed callback port to host, so the redirected browser
      # request `http://localhost:47291/callback?code=...` reaches the in-container
      # Claude Code OAuth server. Only needed during one-time MCP OAuth setup.
      - "127.0.0.1:47291:47291"
    volumes:
      - claude-state:/root/.claude
      - ../:/repo:ro
      - ./output:/output
    stdin_open: true
    tty: true

  # Login service: same image, but interactive entrypoint for one-time Claude Code login.
  # Run once: docker compose run --rm login
  # Then exit; the persisted state stays in the claude-state volume.
  login:
    extends: harness
    entrypoint: ["bash"]
    command: ["-lc", "echo 'Run: claude  (then sign in interactively, exit when done)' && bash"]

volumes:
  claude-state:
