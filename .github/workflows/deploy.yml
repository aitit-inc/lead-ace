name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy-api:
    name: deploy API Worker
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - name: deploy
        run: npx wrangler deploy --config wrangler.api.jsonc --env production
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  deploy-mcp:
    name: deploy MCP Worker
    runs-on: ubuntu-latest
    needs: deploy-api
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - name: deploy
        run: npx wrangler deploy --config wrangler.mcp.jsonc --env production
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  deploy-frontend:
    name: deploy Frontend (Pages)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    env:
      VITE_API_URL: ${{ vars.VITE_API_URL }}
      VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ vars.VITE_SUPABASE_ANON_KEY }}
      VITE_STRIPE_PRICE_STARTER_MONTHLY: ${{ vars.VITE_STRIPE_PRICE_STARTER_MONTHLY }}
      VITE_STRIPE_PRICE_STARTER_YEARLY: ${{ vars.VITE_STRIPE_PRICE_STARTER_YEARLY }}
      VITE_STRIPE_PRICE_PRO_MONTHLY: ${{ vars.VITE_STRIPE_PRICE_PRO_MONTHLY }}
      VITE_STRIPE_PRICE_PRO_YEARLY: ${{ vars.VITE_STRIPE_PRICE_PRO_YEARLY }}
      VITE_STRIPE_PRICE_SCALE_MONTHLY: ${{ vars.VITE_STRIPE_PRICE_SCALE_MONTHLY }}
      VITE_STRIPE_PRICE_SCALE_YEARLY: ${{ vars.VITE_STRIPE_PRICE_SCALE_YEARLY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run check
      - run: npm run build
      - name: deploy
        run: npx wrangler pages deploy --branch main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  deploy-landing:
    name: deploy Landing (Pages)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: landing
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: deploy
        run: npx wrangler@latest pages deploy --branch main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
